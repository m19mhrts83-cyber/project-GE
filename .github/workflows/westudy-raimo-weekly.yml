# project-GE リポジトリ直下に置くこと（215_kamiooya/.github では GitHub に認識されない）
name: WeStudy Delta Import Weekly

permissions:
  contents: write

on:
  schedule:
    # 毎週 日曜 06:30 JST（= 土曜 21:30 UTC）
    - cron: "30 21 * * 6"
  workflow_dispatch:
    inputs:
      force_scrape:
        description: "完了済みトピックも再取得する（--force）"
        required: false
        type: boolean
        default: false

concurrency:
  group: westudy-raimo-weekly
  cancel-in-progress: false

jobs:
  run-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CHATBOT_DIR: 215_kamiooya/C1_cursor/1c_神・大家さん倶楽部_AI推進/神・大家さん倶楽部情報Q&Aチャットボット
      CHATBOT_OUTPUT_ROOT: ${{ github.workspace }}/_runtime/chatbot
      CHATBOT_STATE_ROOT: ${{ github.workspace }}/215_kamiooya/C1_cursor/1c_神・大家さん倶楽部_AI推進/神・大家さん倶楽部情報Q&Aチャットボット/state
      WESTUDY_SCRAPER: ${{ github.workspace }}/ProgramCode/alfred_python/westudy_forum_all.py
      WESTUDY_USER: ${{ secrets.WESTUDY_USER }}
      WESTUDY_PASS: ${{ secrets.WESTUDY_PASS }}
      # RAIMO_* が正。Secrets は RAIMO_* 優先、未設定時は従来の LIMO_* を使用
      RAIMO_APP_URL: ${{ secrets.RAIMO_APP_URL || secrets.LIMO_APP_URL }}
      RAIMO_PORTAL_EMAIL: ${{ secrets.RAIMO_PORTAL_EMAIL || secrets.LIMO_PORTAL_EMAIL }}
      RAIMO_PORTAL_PASSWORD: ${{ secrets.RAIMO_PORTAL_PASSWORD || secrets.LIMO_PORTAL_PASSWORD }}
      RAIMO_ADMIN_EMAIL: ${{ secrets.RAIMO_ADMIN_EMAIL || secrets.LIMO_ADMIN_EMAIL }}
      RAIMO_ADMIN_PASSWORD: ${{ secrets.RAIMO_ADMIN_PASSWORD || secrets.LIMO_ADMIN_PASSWORD }}
      RAIMO_APP_EMAIL: ${{ secrets.RAIMO_APP_EMAIL || secrets.LIMO_APP_EMAIL }}
      RAIMO_APP_PASSWORD: ${{ secrets.RAIMO_APP_PASSWORD || secrets.LIMO_APP_PASSWORD }}
      # 後方互換（エイリアス解決用）
      LIMO_APP_URL: ${{ secrets.LIMO_APP_URL }}
      LIMO_PORTAL_EMAIL: ${{ secrets.LIMO_PORTAL_EMAIL }}
      LIMO_PORTAL_PASSWORD: ${{ secrets.LIMO_PORTAL_PASSWORD }}
      LIMO_ADMIN_EMAIL: ${{ secrets.LIMO_ADMIN_EMAIL }}
      LIMO_ADMIN_PASSWORD: ${{ secrets.LIMO_ADMIN_PASSWORD }}
      LIMO_APP_EMAIL: ${{ secrets.LIMO_APP_EMAIL }}
      LIMO_APP_PASSWORD: ${{ secrets.LIMO_APP_PASSWORD }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RAIMO_NOTIFY_MACOS: "0"
      RAIMO_FAIL_OPEN: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preflight check
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CHATBOT_OUTPUT_ROOT" "$CHATBOT_STATE_ROOT"
          for key in WESTUDY_USER WESTUDY_PASS RAIMO_APP_URL; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing required secret/env: $key"
              exit 1
            fi
          done
          if [[ -z "${SUPABASE_URL:-}" || -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]]; then
            echo "::warning::SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY is missing; Supabase import will be skipped in run_update_and_import.sh"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install selenium playwright supabase
          python -m playwright install --with-deps chromium

      - name: Run scrape + delta + auto import
        shell: bash
        run: |
          set -euo pipefail
          cmd=( "./scripts/run_update_and_import.sh" )
          # 週次 cron は全トピック再取得（完了フラグ付きトピックも新規コメントを拾う）
          force_scrape="false"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            force_scrape="true"
          elif [[ "${{ github.event.inputs.force_scrape || 'false' }}" == "true" ]]; then
            force_scrape="true"
          fi
          if [[ "$force_scrape" == "true" ]]; then
            cmd+=( "--force" )
          fi
          (
            cd "$CHATBOT_DIR"
            "${cmd[@]}"
          )

      - name: Collect latest run info
        id: latest
        shell: bash
        run: |
          set -euo pipefail
          latest_delta=""
          shopt -s nullglob
          _deltas=( "$CHATBOT_OUTPUT_ROOT"/exports/delta_*.csv )
          if ((${#_deltas[@]} > 0)); then
            latest_delta="$(ls -1t "${_deltas[@]}" | head -n 1)"
          fi
          rows=0
          if [[ -n "$latest_delta" && -f "$latest_delta" ]]; then
            rows="$(python -c "import csv,sys; p=sys.argv[1]; print(sum(1 for _ in csv.DictReader(open(p, newline='', encoding='utf-8-sig', errors='replace'))))" "$latest_delta")"
          fi
          echo "delta_file=$latest_delta" >> "$GITHUB_OUTPUT"
          echo "delta_rows=$rows" >> "$GITHUB_OUTPUT"
          upload_note="n/a"
          supabase_note="n/a"
          health_note="n/a"
          latest_log=""
          shopt -s nullglob
          _logs=( "$CHATBOT_OUTPUT_ROOT"/exports/logs/update_and_import_*.log )
          if ((${#_logs[@]} > 0)); then
            latest_log="$(ls -1t "${_logs[@]}" | head -n 1)"
            if rg -q "SUMMARY: 疎通=" "$latest_log" 2>/dev/null; then
              health_note="$(rg "SUMMARY: 疎通=" "$latest_log" | tail -n 1)"
            elif rg -q "heartbeat touch:" "$latest_log" 2>/dev/null; then
              health_note="$(rg "heartbeat touch:" "$latest_log" | tail -n 1)"
            fi
            if rg -q "Supabase取込完了:" "$latest_log" 2>/dev/null; then
              supabase_note="$(rg "Supabase取込完了:" "$latest_log" | tail -n 1)"
            elif rg -q "Supabase環境変数未設定" "$latest_log" 2>/dev/null; then
              supabase_note="skipped (env missing)"
            elif rg -q "Supabase取込失敗" "$latest_log" 2>/dev/null; then
              supabase_note="failed (ログ参照)"
            fi
            if rg -q "Raimo取込完了:" "$latest_log" 2>/dev/null; then
              upload_note="$(rg "Raimo取込完了:" "$latest_log" | tail -n 1)"
            elif rg -q "LIMO取込完了:" "$latest_log" 2>/dev/null; then
              upload_note="$(rg "LIMO取込完了:" "$latest_log" | tail -n 1)"
            elif rg -q "差分0件（ヘッダのみ）" "$latest_log" 2>/dev/null; then
              upload_note="skipped (差分0件)"
              if [[ "$supabase_note" == "n/a" ]]; then
                supabase_note="skipped (差分0件・心拍は別記)"
              fi
            elif rg -q "Raimo取込失敗|LIMO取込失敗" "$latest_log" 2>/dev/null; then
              upload_note="failed (ログ参照)"
            elif [[ "$rows" -gt 0 ]]; then
              upload_note="unknown (ログに完了行なし)"
            fi
          fi
          {
            echo "### WeStudy weekly result"
            if [[ -z "$latest_delta" ]]; then
              echo "- delta: （ファイルなし・パイプライン未生成または失敗の可能性）"
              echo "- rows: n/a"
              echo "- 疎通/心拍: \`$health_note\`"
              echo "- supabase: n/a"
              echo "- raimo: n/a"
            else
              echo "- delta: \`$latest_delta\`"
              echo "- rows: \`$rows\`"
              echo "- 疎通/心拍: \`$health_note\`"
              echo "- supabase: \`$supabase_note\`"
              echo "- raimo: \`$upload_note\`"
            fi
            if [[ -n "$latest_log" ]]; then
              echo "- log: \`$latest_log\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: westudy-raimo-logs-${{ github.run_id }}
          path: |
            ${{ env.CHATBOT_OUTPUT_ROOT }}/exports/logs/
            ${{ env.CHATBOT_OUTPUT_ROOT }}/exports/delta_*.csv
          if-no-files-found: warn
          retention-days: 14

      - name: Commit state updates
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git add "$CHATBOT_DIR/state/westudy_comment_ids.json" "$CHATBOT_DIR/state/westudy_scrape/" 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update WeStudy state ($(date -u '+%Y-%m-%d'))"
          git push
