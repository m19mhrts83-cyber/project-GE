# Numbers「家計費内訳」行名 → Zaim 支出カテゴリ名
# skip: true の行は Zaim 反映対象外（集計行・収入・二重計上回避など）

mappings:
  - numbers: "1. 住居費"
    zaim: "1F.住まい"
  - numbers: "2. 食費（外食費含）"
    zaim: "2C.食費"
  - numbers: "3. 電気・ガス・水道費"
    zaim: "3C.水道/光熱"
  - numbers: "4. 通信費（携帯電話・プロバイダ）"
    zaim: "4C.通信"
  - numbers: "5. 日用雑貨費"
    zaim: "5C.日用雑貨"
  - numbers: "6.1 趣味・娯楽・交際・被服費"
    zaim: "6.1C.エ/交際/被服/趣味"
  - numbers: "6.2 自己投資"
    zaim: "6.2C 自己投資・寄付"
  - numbers: "7. 医療費"
    zaim: "7C.医療費"
  - numbers: "8. ガソリン代・交通費"
    zaim: "8C.交通"
  - numbers: "10.1_子供費_服,雑貨,写真"
    zaim: "10.1C.こども服/雑貨/写真"
  - numbers: "10.2C_子供費_教育費"
    zaim: "10.2C.こども教育"
  - numbers: "10.2F_子供費_学費"
    zaim: "10.2F.こども学費/結婚_固定"
  - numbers: "10.3_子供費_学資保険"
    zaim: "10.3F.学資保険"
  - numbers: "11.1_ 維持費,税金_自動車税/点検"
    zaim: "11.1F.クルマ維持"
  - numbers: "11.2_維持費,税金_固定資産税/年会費"
    zaim: "11.2F.維持(他生活インフラ)"
  - numbers: "12 使途不明金・その他"
    zaim: "12.C.その他/使途不明"
  - numbers: "13.1_保険料_生命保険"
    zaim: "13.1F.生命保険"
  - numbers: "13.2_保険料_自動車保険"
    zaim: "13.2F.自動車保険"
  - numbers: "15 奨学金"
    zaim: "15F.奨学金返済"
  - numbers: "17 帰省・旅行"
    zaim: "17S.帰省・旅行"
  - numbers: "20.1 大型出費（外構/家具購入）"
    zaim: "20.1S.大型出費"
  - numbers: "20.2 ご褒美"
    zaim: "20.2S.ご褒美"
  - numbers: "21. AIリスキリング"
    zaim: "21F.AIリスキリング"
  - numbers: "A. 会社費用"
    zaim: "A.C.会社費用"
  - numbers: "B. インデックス投資"
    zaim: "B.C.投資"

skip_patterns:
  - "家計費内訳"
  - "手取り月収"
  - "小遣い"
  - "貯蓄"
  - "←"
  - "支出小計"
  - "予測生活費"
  - "支出合計"
  - "収支予測"
  - "マンションローン"
  - "自動車(家電"
