# 東海労金 インターネットバンキング用 設定例
# コピーして config_tokairokin.yaml にリネームし、必要に応じて編集してください。
# config_tokairokin.yaml は .gitignore に入れてください。

# ログインURL（東海労金インターネットバンキング）
# ib.rokin.jp/nprotect は案内ページ。実際のログインフォームは parasol.anser.ne.jp
login_url: "https://www.parasol.anser.ne.jp/ib/index.do?PT=BS&CCT0080=2972"

# 認証情報は .env の TOKAIROKIN_USER / TOKAIROKIN_PASS を使用

# ブラウザを表示するか（true: 表示 / false: 非表示で実行）
# 初回・デバッグ時は false 推奨
headless: false

# 待機時間（秒）。ログイン後やページ読み込み後の余裕
wait_after_login: 3
wait_after_page: 2

# 振込実行時の待機（確認画面→実行ボタンなど）
wait_after_transfer_confirm: 2
# 振込画面表示後、銀行・支店入力が使えるまで待つ最大秒数（振込時間の案内等が消えてフォームが出るまで）
wait_for_transfer_form_ready: 45

# インストール済みChromeを使用（自動化検知を回避）
use_chrome: true

# 代替手段：undetected-chromedriver（CDP・stealth で検知された場合に試す）
use_undetected_chromedriver: true
# ChromeDriver のバージョン不一致時、Chrome のメジャーバージョンを指定（例: 145）
chrome_version_main: 147

# CDP接続モード（use_undetected_chromedriver が false のときのみ有効）
use_connect_cdp: false
cdp_url: "http://localhost:9222"
auto_start_chrome: true

# 合言葉の自動入力（質問文に含まれるキーワードと .env の変数名の対応）
# .env に TOKAIROKIN_SECRET_* を設定（例: 母親の誕生日は画面の例に合わせ「1月1日」など）
# match には、表示される質問文の一部（他と区別できるキーワード）を指定（先頭ほど優先）
#
# 追加認証 BLI017（BLI001Dispatch）画面の文言・開発者ツールより（2026-05 確認）
# 見出し「追加認証（合言葉認証）」、質問例「質問　母親の誕生日は？（例：１月１日）」、入力 id=txtBox001 name=BPW0010
secret_phrase_page_markers:
  - "追加認証（合言葉認証）"
  - "追加認証の入力"
  - "BLI017"
  - "母親の誕生日"
  - "[必須] 回答"
  - "質問に対する回答"
  - "合言葉"
  - "あいことば"
  - "秘密の質問"
  - "確認用の質問"
  - "質問にお答え"
  - "お答えください"
  - "追加認証"
  - "ご本人様確認"
  - "ご本人確認"
  - "登録された"
secret_phrase_auto:
  - match: "母親の誕生日"
    answer_env: TOKAIROKIN_SECRET_1
  - match: "誕生日"
    answer_env: TOKAIROKIN_SECRET_1
  - match: "ペット"
    answer_env: TOKAIROKIN_SECRET_2
  - match: "活動"
    answer_env: TOKAIROKIN_SECRET_3
# BLI017 回答欄優先（振込フォームとは別画面のため同一 id でも競合しない）
secret_phrase_input_selectors:
  - "#txtBox001"
  - "input[name='BPW0010']"
  - "input.inputA01[type='text']"
  - "input[type='text']:not([readonly])"
  - "input[name*='kotoba'], input[name*='answer'], input[id*='kotoba'], input[id*='answer']"
  - "input.txtBox, input[id^='txtBox']"
# 追加認証の文言が iframe 内だけにあるときも検出・入力する（既定 true）
secret_phrase_check_iframes: true
# ログイン直後、質問DOMが載るまでポーリングする最大秒（0 で無効）。早すぎる再ログインで質問が見えない問題の対策
secret_phrase_dom_wait_seconds: 42
secret_phrase_dom_poll_seconds: 0.5
# 「再ログイン」クリック後にのみ質問が出る場合の追加ポーリング（秒）
secret_phrase_dom_wait_seconds_after_relogin: 22

# ログイン後、合言葉の自動入力ができなかった場合に一時停止するか
pause_for_secret_phrase: true
# 【主経路】合言葉画面が検出されず、ログイン後トップ相当なら合言葉の Enter 待ちをせず振込へ進む。
# fetch_after_login 側の既定でも動くが、明示したいときは以下をアンコメントして調整する。
post_login_dashboard_detect:
  url_contains_any: ["BLI001Dispatch"]
  # 本文に一致する語が無くても Dispatch URL のみでトップ相当とみなす（iframe で本文が薄いときの救済）。厳密にしたいときは false。
  allow_dispatch_url_without_body_markers: true
  # body_contains_any は省略可（コード側既定にフォールバック）。上記 relaxed と併用で十分なことが多い。

# ログイン後に振込画面へ遷移
go_to_transfer: true
wait_before_transfer_menu: 5
# トップで振込ボタンクリック後、次ページ描画までの待ち（秒）。小さくすると遷移体感が速くなる場合あり
wait_after_transfer_menu_click_seconds: 0.85
# 振込メニュー要素の明示待ちタイムアウト（秒）
transfer_menu_element_timeout_seconds: 11
# 無操作切断対策（fetch_after_login が待機中に軽くページへアクセス）
session_keepalive_enabled: true
session_keepalive_interval_seconds: 5
session_keepalive_fetch_head: true
# HEAD を execute_async_script で完了まで待つ（秒）
session_keepalive_fetch_timeout_seconds: 12
wait_enter_keepalive_interval_seconds: 5
session_keepalive_poll_seconds: 1.0
# 振込フォーム待機ループで毎回軽くスクロール（無操作判定の緩和）
session_keepalive_every_poll_during_form_wait: true
# transfer_direct_* 遷移直後・フォーム直前の連続キープアライブ（短ゲート対策）
transfer_page_keepalive_burst_count: 16
transfer_page_keepalive_burst_interval_seconds: 0.3
# 振込フォームが iframe 内のときセレクタ探索する
transfer_form_search_iframes: true
transfer_form_iframe_max_depth: 6
# セレクタ検証時のみ true またはコマンドに --inspect-transfer-screen
pause_for_transfer_screen_inspect: false
# 振込画面へ直接URLで遷移（クリック不要）。指定時はこちらを優先
# 現在ページの ServerID を維持して遷移するため、パスだけ指定（推奨）
# ※直遷移で即 B0470 になる場合がある（セッションは生きている）。そのときトップへ戻してメニュークリックへフォールバックする:
transfer_direct_fallback_to_menu_on_b0470: true
# false のとき先に画面上の振込メニューをクリックし、ダメなら transfer_direct_* を試す（東海労金向け推奨）
transfer_direct_first: false
transfer_direct_path: "BPT001Dispatch"
# またはフルURLを指定（ServerID はセッションで変わる場合あり）
# transfer_direct_url: "https://www.parasol.anser.ne.jp/ib/BPT001Dispatch?ServerID=RSRA0506&B=2972&PT=BS"
# 上記を未指定時のみ「振込」ボタンクリックを試行
transfer_menu_button_selector: "#btn002-1"
# 振込メニュー画面の「日付振込」ボタン（フルXPath可）。指定時はクリックで次の画面へ遷移
# transfer_dated_transfer_button_selector: "/html/body/div[4]/div/div/div[1]/div/div[6]/ul/li/div[2]/form/ul/li[1]/button"

# 振込フォームの自動入力（--bank --branch --account --amount で指定時）
# 振込画面のHTMLを確認し、各セレクタを設定してください（開発者ツールで要素を検証）
transfer_form:
  # 振込URL直後〜振込先入力前に押すボタン（ユーザー確認: #btn002-1）
  specify_destination_button_selector: "#btn002-1"
  # 銀行コード入力後、検索ボタン
  bank_confirm_button_selector: "#btn008"
  # 検索結果の「選択」ボタン（金融機関）
  bank_select_button_selector: ""
  # 支店コード入力後、検索ボタン
  branch_confirm_button_selector: "#btn001"
  # 検索結果の「選択」ボタン（支店）
  branch_select_button_selector: ""
  bank_code_selector: "#txtBox001"
  branch_code_selector: "#txtBox001"
  account_number_selector: "/html/body/div[4]/div/div/form/div[2]/div[5]/table/tbody/tr[2]/td/input"
  amount_selector: "/html/body/div[4]/div/div/form/div[2]/div[5]/table/tbody/tr[3]/td/input"
  # 口座・金額入力後、確認画面から実行画面へ進むボタン（例: 実行画面へ、次へ）
  execution_screen_button_selector: ""
  # 実行画面の「確認しました」チェックボックス（OTP入力前にチェック必須）
  confirmation_checkbox_selector: ""
  # OTP 入力欄（ワンタイムPW アプリの番号を手入力）。東海労金では #pswd002
  otp_input_selector: "#pswd002"
  otp_submit_selector: ""

# OTP を Gmail API で自動入力するか（既定 false。東海労金 OTP はワンタイムPW アプリ由来）
fetch_otp_from_gmail: false

# OTP 入力欄が現れるまでの最大待ち秒（チャット連携・手入力モード時のみポーリング）
otp_field_wait_seconds: 18

# ワンタイムパスワード入力のため一時停止（振込時は自動で有効）
pause_for_otp: true
# OTP 画面で番号入力・実行確定の直前に一度ホールドし、チャット確認後ターミナル Enter（fetch_otp_from_gmail が false のとき）
otp_hold_before_manual_entry: true

# ブラウザを開いたままにする（パスワード変更画面などの対応を可能に）
keep_browser_open: true
