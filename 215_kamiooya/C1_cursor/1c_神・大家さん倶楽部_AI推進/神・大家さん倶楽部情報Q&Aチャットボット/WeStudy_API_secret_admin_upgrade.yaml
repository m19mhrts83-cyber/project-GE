name: WeStudy QA Chatbot
description: WeStudyコミュニティ情報Q&AチャットボットのバックエンドAPI
api:
  # SendGrid の api ステップはプレースホルダキーで失敗しやすく、全体が HTTP500 になることがあるため省略。
  # 通知が必要ならキー設定後に別名 API で追加してください。
  - name: registerUser
    endpoint: POST /auth/register
    steps:
      - tableInsert:
          table: users
          data:
            email: "input.email"
            password_hash: "input.password_hash"
            role: "'user'"
            status: "'pending'"
        as: user
    output:
      id: "inserted.user"

  - name: registerAdminWithSecret
    endpoint: POST /auth/secret-admin-register
    steps:
      - check:
          condition: "input.secret_key != ''"
          errorCode: "secret_required"
          errorMessage: "'シークレットキーは必須です'"
      - check:
          condition: "input.secret_key == '1162'"
          errorCode: "invalid_secret"
          errorMessage: "'シークレットキーが一致しません'"
      - tableInsert:
          table: users
          data:
            email: "input.email"
            password_hash: "input.password_hash"
            role: "'admin'"
            status: "'approved'"
        as: adminUser
    output:
      id: "inserted.adminUser"

  # 先に tableFetchOne だけだと「行なし」で実行エンジンが 500 になる例があるため、
  # メール一致で UPDATE → 再 FETCH で存在判定する。
  - name: upgradeToAdminWithSecret
    endpoint: POST /auth/secret-admin-upgrade
    steps:
      - check:
          condition: "input.secret_key != ''"
          errorCode: "secret_required"
          errorMessage: "'シークレットキーは必須です'"
      - check:
          condition: "input.secret_key == '1162'"
          errorCode: "invalid_secret"
          errorMessage: "'シークレットキーが一致しません'"
      - tableUpdate:
          table: users
          set:
            password_hash: "input.password_hash"
            role: "'admin'"
            status: "'approved'"
          where:
            email: "input.email"
      - tableFetchOne:
          table: users
          where:
            email: "input.email"
        as: user
      - check:
          condition: "fetched.user != null"
          errorCode: "user_not_found"
          errorMessage: "'このメールアドレスは未登録のため、新規の管理者登録処理に切り替えてください'"
    output:
      success: "'true'"

  - name: listPendingUsers
    endpoint: GET /admin/users/pending
    steps:
      - tableFetchMany:
          table: users
          where:
            status: "'pending'"
        as: users
    output:
      users: "fetched.users"

  - name: approveUser
    endpoint: PUT /admin/users/{id}/approve
    steps:
      - tableUpdate:
          table: users
          set:
            status: "'approved'"
          where:
            id: "path.id"
    output:
      success: "'true'"

  - name: login
    endpoint: POST /auth/login
    steps:
      - tableFetchOne:
          table: users
          where:
            email: "input.email"
            password_hash: "input.password_hash"
        as: user
      - check:
          condition: "fetched.user != null"
          errorCode: "invalid_credentials"
          errorMessage: "'メールアドレスまたはパスワードが間違っています'"
      - check:
          condition: "fetched.user.status == 'approved'"
          errorCode: "not_approved"
          errorMessage: "'管理者の承認待ちです'"
    output:
      user: "fetched.user"

  - name: createComment
    endpoint: POST /admin/comments
    steps:
      - tableInsert:
          table: comments
          data:
            source_type: "input.source_type"
            comment_id: "input.comment_id"
            posted_at: "input.posted_at"
            author_name: "input.author_name"
            author_email: "input.author_email"
            content: "input.content"
            parent_comment_id: "input.parent_comment_id"
            ip_address: "input.ip_address"
            user_agent: "input.user_agent"
        as: comment
    output:
      id: "inserted.comment"

  - name: listComments
    endpoint: GET /comments
    steps:
      - tableFetchMany:
          table: comments
          orderBy: "posted_at DESC"
          limit: 50000
        as: comments
    output:
      comments: "fetched.comments"

  # 物理削除（1行ずつ）。DELETE+JSON は環境によって input が空になり 500 になりやすいため POST に統一。
  # 一括 tableDelete は行数・エンジン制限で 500 になり得るため、フロントは複数回この API を呼ぶ。
  - name: deleteCommentById
    endpoint: POST /admin/comments/{id}/delete
    steps:
      - tableDelete:
          table: comments
          where:
            id: "path.id"
    output:
      success: "'true'"

  - name: createChatSession
    endpoint: POST /chat-sessions
    steps:
      - llm:
          model: "gemini-3-flash-preview"
          prompt: "'次の質問内容から、短く簡潔なチャットのタイトルを生成してください: ' + input.initial_message"
        as: generatedTitle
      - tableInsert:
          table: chat_sessions
          data:
            user_id: "input.user_id"
            title: "llm.generatedTitle"
        as: session
    output:
      id: "inserted.session"
      title: "llm.generatedTitle"

  - name: listChatSessionsByUser
    endpoint: GET /users/{id}/chat-sessions
    steps:
      - tableFetchMany:
          table: chat_sessions
          where:
            user_id: "path.id"
          orderBy: "created_at DESC"
        as: sessions
    output:
      sessions: "fetched.sessions"

  - name: getChatSessionDetails
    endpoint: GET /chat-sessions/{id}
    steps:
      - tableFetchOne:
          table: chat_sessions
          where:
            id: "path.id"
        as: session
      - tableFetchMany:
          table: chat_messages
          where:
            session_id: "path.id"
          orderBy: "created_at ASC"
        as: messages
    output:
      session: "fetched.session"
      messages: "fetched.messages"

  - name: sendMessage
    endpoint: POST /chat-sessions/{id}/messages
    steps:
      - tableInsert:
          table: chat_messages
          data:
            session_id: "path.id"
            role: "'user'"
            content: "input.content"
        as: userMessage
      - llm:
          model: "gemini-3-flash-preview"
          prompt: "'次の質問から、データベース検索用の重要なキーワードを1つだけ抽出してください。キーワードのみを出力してください: ' + input.content"
        as: keyword
      - tableFetchMany:
          table: comments
          whereRaw:
            sql: "content LIKE CONCAT('%', ?, '%')"
            params:
              - "llm.keyword"
          limit: 10
        as: relatedComments
      - calculate:
          expression: "'以下の参考情報(JSON)をもとに、ユーザーの質問に答えてください。参考情報: ' + fetched.relatedComments + ' 質問: ' + input.content"
        as: promptText
      - llm:
          model: "gemini-3-flash-preview"
          prompt: "computed.promptText"
        as: answer
      - tableInsert:
          table: chat_messages
          data:
            session_id: "path.id"
            role: "'assistant'"
            content: "llm.answer"
        as: assistantMessage
    output:
      answer: "llm.answer"

  - name: listSuggestedQuestions
    endpoint: GET /suggested-questions
    steps:
      - tableFetchMany:
          table: suggested_questions
          orderBy: "frequency DESC"
          limit: 5
        as: questions
    output:
      questions: "fetched.questions"

  - name: incrementSuggestedQuestionFrequency
    endpoint: PUT /suggested-questions/{id}/increment
    steps:
      - tableFetchOne:
          table: suggested_questions
          where:
            id: "path.id"
        as: question
      - calculate:
          expression: "fetched.question.frequency + 1"
        as: newFrequency
      - tableUpdate:
          table: suggested_questions
          set:
            frequency: "computed.newFrequency"
          where:
            id: "path.id"
    output:
      success: "'true'"

  - name: createSuggestedQuestion
    endpoint: POST /suggested-questions
    steps:
      - tableInsert:
          table: suggested_questions
          data:
            question_text: "input.question_text"
            frequency: 1
        as: question
    output:
      id: "inserted.question"
