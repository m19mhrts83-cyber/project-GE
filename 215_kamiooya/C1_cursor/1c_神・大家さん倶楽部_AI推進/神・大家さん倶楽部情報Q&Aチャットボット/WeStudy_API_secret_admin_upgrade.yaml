name: WeStudy QA Chatbot
description: WeStudyコミュニティ情報Q&AチャットボットのバックエンドAPI
api:
  # 外部 HTTP は登録 API に埋め込まない（失敗時の全体 500 回避）。通知は専用 API を使う。
  # __NOTIFY_*__ は publish_raimo_1346.py が .env.jarvis_private の NOTIFY_* から注入する。
  - name: registerUser
    endpoint: POST /auth/register
    steps:
      - tableInsert:
          table: users
          data:
            email: "input.email"
            password_hash: "input.password_hash"
            role: "'user'"
            status: "'pending'"
        as: user
    output:
      id: "inserted.user"

  # Phase 1: 承認依頼メール通知（GAS）。register とは分離。Phase 2 で登録成功後に呼ぶ。
  - name: notifyRegistration
    endpoint: POST /notify/registration
    steps:
      - check:
          condition: "input.email != ''"
          errorCode: "email_required"
          errorMessage: "'メールアドレスは必須です'"
      - api:
          url: "__NOTIFY_WEBHOOK_URL__"
          method: "POST"
          headers:
            Content-Type: "application/json"
          body:
            secret: "'__NOTIFY_SHARED_SECRET__'"
            email: "input.email"
            registered_at: "input.registered_at"
            note: "input.note"
        as: gas
    output:
      ok: "'true'"

  # Phase 3: 承認完了メール（申請者宛）。approve API とは分離。
  - name: notifyApproval
    endpoint: POST /notify/approval
    steps:
      - check:
          condition: "input.email != ''"
          errorCode: "email_required"
          errorMessage: "'メールアドレスは必須です'"
      - api:
          url: "__NOTIFY_WEBHOOK_URL__"
          method: "POST"
          headers:
            Content-Type: "application/json"
          body:
            secret: "'__NOTIFY_SHARED_SECRET__'"
            type: "'approval'"
            email: "input.email"
        as: gas
    output:
      ok: "'true'"

  # Phase 4: パスワード再設定メール（申請者宛）。issue API とは分離。
  - name: notifyPasswordReset
    endpoint: POST /notify/password-reset
    steps:
      - check:
          condition: "input.email != ''"
          errorCode: "email_required"
          errorMessage: "'メールアドレスは必須です'"
      - check:
          condition: "input.reset_url != ''"
          errorCode: "reset_url_required"
          errorMessage: "'再設定URLは必須です'"
      - api:
          url: "__NOTIFY_WEBHOOK_URL__"
          method: "POST"
          headers:
            Content-Type: "application/json"
          body:
            secret: "'__NOTIFY_SHARED_SECRET__'"
            type: "'password_reset'"
            email: "input.email"
            reset_url: "input.reset_url"
            expires_at: "input.expires_at"
        as: gas
    output:
      ok: "'true'"

  - name: registerAdminWithSecret
    endpoint: POST /auth/secret-admin-register
    steps:
      - check:
          condition: "input.secret_key != ''"
          errorCode: "secret_required"
          errorMessage: "'シークレットキーは必須です'"
      - check:
          condition: "input.secret_key == '1162'"
          errorCode: "invalid_secret"
          errorMessage: "'シークレットキーが一致しません'"
      - tableInsert:
          table: users
          data:
            email: "input.email"
            password_hash: "input.password_hash"
            role: "'admin'"
            status: "'approved'"
        as: adminUser
    output:
      id: "inserted.adminUser"

  # 先に tableFetchOne だけだと「行なし」で実行エンジンが 500 になる例があるため、
  # メール一致で UPDATE → 再 FETCH で存在判定する。
  - name: upgradeToAdminWithSecret
    endpoint: POST /auth/secret-admin-upgrade
    steps:
      - check:
          condition: "input.secret_key != ''"
          errorCode: "secret_required"
          errorMessage: "'シークレットキーは必須です'"
      - check:
          condition: "input.secret_key == '1162'"
          errorCode: "invalid_secret"
          errorMessage: "'シークレットキーが一致しません'"
      - tableUpdate:
          table: users
          set:
            password_hash: "input.password_hash"
            role: "'admin'"
            status: "'approved'"
          where:
            email: "input.email"
      - tableFetchOne:
          table: users
          where:
            email: "input.email"
        as: user
      - check:
          condition: "fetched.user != null"
          errorCode: "user_not_found"
          errorMessage: "'このメールアドレスは未登録のため、新規の管理者登録処理に切り替えてください'"
    output:
      success: "'true'"

  - name: listPendingUsers
    endpoint: GET /admin/users/pending
    steps:
      - tableFetchMany:
          table: users
          where:
            status: "'pending'"
        as: users
    output:
      users: "fetched.users"

  - name: approveUser
    endpoint: PUT /admin/users/{id}/approve
    steps:
      - tableUpdate:
          table: users
          set:
            status: "'approved'"
          where:
            id: "path.id"
    output:
      success: "'true'"

  - name: login
    endpoint: POST /auth/login
    steps:
      - tableFetchOne:
          table: users
          where:
            email: "input.email"
            password_hash: "input.password_hash"
        as: user
      - check:
          condition: "fetched.user != null"
          errorCode: "invalid_credentials"
          errorMessage: "'メールアドレスまたはパスワードが間違っています'"
      - check:
          condition: "fetched.user.status == 'approved'"
          errorCode: "not_approved"
          errorMessage: "'管理者の承認待ちです'"
    output:
      user: "fetched.user"

  # Phase 4: パスワード再設定（1）メール確認（未登録文言を要件どおり）
  - name: checkResetPasswordEmail
    endpoint: POST /auth/reset-password/check
    steps:
      - tableFetchOne:
          table: users
          where:
            email: "input.email"
        as: user
      - check:
          condition: "fetched.user != null"
          errorCode: "user_not_found"
          errorMessage: "'登録されたメールアドレスを入力してください'"
      - check:
          condition: "fetched.user.status == 'approved'"
          errorCode: "not_approved"
          errorMessage: "'まだ管理者の承認待ちです。承認後にパスワードを再設定できます'"
    output:
      email: "fetched.user.email"

  # Phase 4: トークン発行（フロントが UUID を生成して渡す）
  - name: issueForgotPasswordToken
    endpoint: POST /auth/forgot-password/issue
    steps:
      - check:
          condition: "input.email != ''"
          errorCode: "email_required"
          errorMessage: "'メールアドレスは必須です'"
      - check:
          condition: "input.token != ''"
          errorCode: "token_required"
          errorMessage: "'トークンは必須です'"
      - check:
          condition: "input.expires_at != ''"
          errorCode: "expires_required"
          errorMessage: "'有効期限は必須です'"
      - tableFetchOne:
          table: users
          where:
            email: "input.email"
        as: user
      - check:
          condition: "fetched.user != null"
          errorCode: "user_not_found"
          errorMessage: "'登録されたメールアドレスを入力してください'"
      - check:
          condition: "fetched.user.status == 'approved'"
          errorCode: "not_approved"
          errorMessage: "'まだ管理者の承認待ちです。承認後にパスワードを再設定できます'"
      - tableUpdate:
          table: users
          set:
            reset_token: "input.token"
            reset_expires_at: "input.expires_at"
          where:
            email: "input.email"
    output:
      email: "input.email"
      success: "'true'"

  # Phase 4: トークン検証（有効期限の大小比較は Raimo DSL 非対応のためフロントで判定）
  - name: validateForgotPasswordToken
    endpoint: POST /auth/forgot-password/validate
    steps:
      - check:
          condition: "input.token != ''"
          errorCode: "token_required"
          errorMessage: "'トークンは必須です'"
      - tableFetchOne:
          table: users
          where:
            reset_token: "input.token"
        as: user
      - check:
          condition: "fetched.user != null"
          errorCode: "invalid_token"
          errorMessage: "'再設定リンクが無効です。もう一度メールアドレスからやり直してください'"
      - check:
          condition: "fetched.user.status == 'approved'"
          errorCode: "not_approved"
          errorMessage: "'まだ管理者の承認待ちです。承認後にパスワードを再設定できます'"
    output:
      email: "fetched.user.email"
      token: "input.token"
      expires_at: "fetched.user.reset_expires_at"

  # Phase 4: 新パスワード保存（token 必須。email だけでは不可）
  - name: resetPassword
    endpoint: POST /auth/reset-password
    steps:
      - check:
          condition: "input.token != ''"
          errorCode: "token_required"
          errorMessage: "'トークンは必須です'"
      - check:
          condition: "input.password_hash != ''"
          errorCode: "password_required"
          errorMessage: "'新しいパスワードは必須です'"
      - tableFetchOne:
          table: users
          where:
            reset_token: "input.token"
        as: user
      - check:
          condition: "fetched.user != null"
          errorCode: "invalid_token"
          errorMessage: "'再設定リンクが無効です。もう一度メールアドレスからやり直してください'"
      - check:
          condition: "fetched.user.status == 'approved'"
          errorCode: "not_approved"
          errorMessage: "'まだ管理者の承認待ちです。承認後にパスワードを再設定できます'"
      - tableUpdate:
          table: users
          set:
            password_hash: "input.password_hash"
            reset_token: "''"
            reset_expires_at: "''"
          where:
            reset_token: "input.token"
    output:
      success: "'true'"
      email: "fetched.user.email"

  - name: createComment
    endpoint: POST /admin/comments
    steps:
      - tableInsert:
          table: comments
          data:
            source_type: "input.source_type"
            comment_id: "input.comment_id"
            posted_at: "input.posted_at"
            author_name: "input.author_name"
            author_email: "input.author_email"
            content: "input.content"
            parent_comment_id: "input.parent_comment_id"
            ip_address: "input.ip_address"
            user_agent: "input.user_agent"
        as: comment
    output:
      id: "inserted.comment"

  - name: listComments
    endpoint: GET /comments
    steps:
      - tableFetchMany:
          table: comments
          orderBy: "posted_at DESC"
          limit: 50000
        as: comments
    output:
      comments: "fetched.comments"

  # 物理削除（1行ずつ）。DELETE+JSON は環境によって input が空になり 500 になりやすいため POST に統一。
  # 一括 tableDelete は行数・エンジン制限で 500 になり得るため、フロントは複数回この API を呼ぶ。
  - name: deleteCommentById
    endpoint: POST /admin/comments/{id}/delete
    steps:
      - tableDelete:
          table: comments
          where:
            id: "path.id"
    output:
      success: "'true'"

  - name: createChatSession
    endpoint: POST /chat-sessions
    steps:
      - llm:
          model: "gemini-3-flash-preview"
          prompt: "'次の質問内容から、短く簡潔なチャットのタイトルを生成してください: ' + input.initial_message"
        as: generatedTitle
      - tableInsert:
          table: chat_sessions
          data:
            user_id: "input.user_id"
            title: "llm.generatedTitle"
        as: session
    output:
      id: "inserted.session"
      title: "llm.generatedTitle"

  - name: listChatSessionsByUser
    endpoint: GET /users/{id}/chat-sessions
    steps:
      - tableFetchMany:
          table: chat_sessions
          where:
            user_id: "path.id"
          orderBy: "created_at DESC"
        as: sessions
    output:
      sessions: "fetched.sessions"

  - name: getChatSessionDetails
    endpoint: GET /chat-sessions/{id}
    steps:
      - tableFetchOne:
          table: chat_sessions
          where:
            id: "path.id"
        as: session
      - tableFetchMany:
          table: chat_messages
          where:
            session_id: "path.id"
          orderBy: "created_at ASC"
        as: messages
    output:
      session: "fetched.session"
      messages: "fetched.messages"

  - name: sendMessage
    endpoint: POST /chat-sessions/{id}/messages
    steps:
      - tableInsert:
          table: chat_messages
          data:
            session_id: "path.id"
            role: "'user'"
            content: "input.content"
        as: userMessage
      - llm:
          model: "gemini-3-flash-preview"
          prompt: "'次の質問から、データベース検索用の重要なキーワードを1つだけ抽出してください。キーワードのみを出力してください: ' + input.content"
        as: keyword
      - tableFetchMany:
          table: comments
          whereRaw:
            sql: "content LIKE CONCAT('%', ?, '%')"
            params:
              - "llm.keyword"
          limit: 8
        as: relatedComments
      - tableFetchMany:
          table: knowledge_chunks
          whereRaw:
            sql: "content LIKE CONCAT('%', ?, '%')"
            params:
              - "llm.keyword"
          limit: 8
        as: relatedChunks
      - tableFetchMany:
          table: knowledge_sources
          limit: 500
        as: relatedSources
      - calculate:
          expression: "'あなたは神・大家さん倶楽部の情報Q&Aアシスタントです。必ず与えられた参考情報だけを根拠に、日本語で簡潔に答えてください。参考に無いことは推測せず『参照内で確証が取れない』と書いてください。回答の末尾に「出典」見出しを付け、使った情報を次の形式で列挙してください。コミュニティ: [WeStudyコミュニティ] #comment_id 投稿者。セミナー: [WeStudyセミナー動画] knowledge_sources.title start_sec秒（video_urlがあれば併記）。チャンク本文の先頭をタイトル代わりにしないこと。\\n\\n参考コミュニティ(JSON): ' + fetched.relatedComments + '\\n\\n参考セミナー動画ソース(JSON): ' + fetched.relatedSources + '\\n\\n参考セミナー動画チャンク(JSON): ' + fetched.relatedChunks + '\\n\\n質問: ' + input.content"
        as: promptText
      - llm:
          model: "gemini-3-flash-preview"
          prompt: "computed.promptText"
        as: answer
      - tableInsert:
          table: chat_messages
          data:
            session_id: "path.id"
            role: "'assistant'"
            content: "llm.answer"
        as: assistantMessage
    output:
      answer: "llm.answer"
      relatedComments: "fetched.relatedComments"
      relatedChunks: "fetched.relatedChunks"

  - name: listKnowledgeChunks
    endpoint: GET /knowledge-chunks
    steps:
      - tableFetchMany:
          table: knowledge_chunks
          orderBy: "start_sec ASC"
          limit: 20000
        as: chunks
    output:
      chunks: "fetched.chunks"

  - name: listKnowledgeSources
    endpoint: GET /knowledge-sources
    steps:
      - tableFetchMany:
          table: knowledge_sources
          orderBy: "id DESC"
          limit: 5000
        as: sources
    output:
      sources: "fetched.sources"

  - name: upsertKnowledgeSource
    endpoint: POST /admin/knowledge-sources
    steps:
      - tableInsert:
          table: knowledge_sources
          data:
            source_key: "input.source_key"
            source_kind: "input.source_kind"
            content_channel: "input.content_channel"
            title: "input.title"
            video_id: "input.video_id"
            video_url: "input.video_url"
            instructor: "input.instructor"
            origin_path: "input.origin_path"
            meta_json: "input.meta_json"
            ingest_status: "input.ingest_status"
        as: source
    output:
      id: "inserted.source"

  # 既存 source_key の上書き（再ミラー時）。INSERT の unique 衝突回避用。
  - name: updateKnowledgeSource
    endpoint: POST /admin/knowledge-sources/update
    steps:
      - tableUpdate:
          table: knowledge_sources
          set:
            source_kind: "input.source_kind"
            content_channel: "input.content_channel"
            title: "input.title"
            video_id: "input.video_id"
            video_url: "input.video_url"
            instructor: "input.instructor"
            origin_path: "input.origin_path"
            meta_json: "input.meta_json"
            ingest_status: "input.ingest_status"
          where:
            source_key: "input.source_key"
    output:
      success: "'true'"

  - name: upsertKnowledgeChunk
    endpoint: POST /admin/knowledge-chunks
    steps:
      - tableInsert:
          table: knowledge_chunks
          data:
            chunk_key: "input.chunk_key"
            source_key: "input.source_key"
            start_sec: "input.start_sec"
            end_sec: "input.end_sec"
            speaker: "input.speaker"
            content: "input.content"
            search_text: "input.search_text"
        as: chunk
    output:
      id: "inserted.chunk"

  # 再ミラー前に同一 source_key のチャンクを消す（重複防止）。件数が多いと 500 のことがある。
  - name: deleteKnowledgeChunksBySource
    endpoint: POST /admin/knowledge-chunks/delete-by-source
    steps:
      - tableDelete:
          table: knowledge_chunks
          where:
            source_key: "input.source_key"
    output:
      success: "'true'"

  - name: listSuggestedQuestions
    endpoint: GET /suggested-questions
    steps:
      - tableFetchMany:
          table: suggested_questions
          orderBy: "frequency DESC"
          limit: 5
        as: questions
    output:
      questions: "fetched.questions"

  - name: incrementSuggestedQuestionFrequency
    endpoint: PUT /suggested-questions/{id}/increment
    steps:
      - tableFetchOne:
          table: suggested_questions
          where:
            id: "path.id"
        as: question
      - calculate:
          expression: "fetched.question.frequency + 1"
        as: newFrequency
      - tableUpdate:
          table: suggested_questions
          set:
            frequency: "computed.newFrequency"
          where:
            id: "path.id"
    output:
      success: "'true'"

  - name: createSuggestedQuestion
    endpoint: POST /suggested-questions
    steps:
      - tableInsert:
          table: suggested_questions
          data:
            question_text: "input.question_text"
            frequency: 1
        as: question
    output:
      id: "inserted.question"
