name: WeStudy Delta Import Weekly

permissions:
  contents: write

on:
  schedule:
    # 毎週 日曜 06:30 JST（= 土曜 21:30 UTC）
    - cron: "30 21 * * 6"
  workflow_dispatch:
    inputs:
      force_scrape:
        description: "完了済みトピックも再取得する（--force）"
        required: false
        type: boolean
        default: false

concurrency:
  group: westudy-limo-weekly
  cancel-in-progress: false

jobs:
  run-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CHATBOT_DIR: C1_cursor/1c_神・大家さん倶楽部_AI推進/神・大家さん倶楽部情報Q&Aチャットボット
      CHATBOT_OUTPUT_ROOT: ${{ github.workspace }}/_runtime/chatbot
      CHATBOT_STATE_ROOT: ${{ github.workspace }}/C1_cursor/1c_神・大家さん倶楽部_AI推進/神・大家さん倶楽部情報Q&Aチャットボット/state
      # ランナーには ~/git-repos が無いため、リポジトリルートから明示する
      WESTUDY_SCRAPER: ${{ github.workspace }}/ProgramCode/alfred_python/westudy_forum_all.py
      WESTUDY_USER: ${{ secrets.WESTUDY_USER }}
      WESTUDY_PASS: ${{ secrets.WESTUDY_PASS }}
      LIMO_APP_URL: ${{ secrets.LIMO_APP_URL }}
      LIMO_PORTAL_EMAIL: ${{ secrets.LIMO_PORTAL_EMAIL }}
      LIMO_PORTAL_PASSWORD: ${{ secrets.LIMO_PORTAL_PASSWORD }}
      LIMO_ADMIN_EMAIL: ${{ secrets.LIMO_ADMIN_EMAIL }}
      LIMO_ADMIN_PASSWORD: ${{ secrets.LIMO_ADMIN_PASSWORD }}
      LIMO_APP_EMAIL: ${{ secrets.LIMO_APP_EMAIL }}
      LIMO_APP_PASSWORD: ${{ secrets.LIMO_APP_PASSWORD }}
      # CI では通知不要
      LIMO_NOTIFY_MACOS: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preflight check
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CHATBOT_OUTPUT_ROOT" "$CHATBOT_STATE_ROOT"
          for key in WESTUDY_USER WESTUDY_PASS LIMO_APP_URL; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing required secret/env: $key"
              exit 1
            fi
          done

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install selenium playwright
          python -m playwright install --with-deps chromium

      - name: Run scrape + delta + auto import
        shell: bash
        run: |
          set -euo pipefail
          cmd=( "./scripts/run_update_and_import.sh" )
          if [[ "${{ github.event.inputs.force_scrape || 'false' }}" == "true" ]]; then
            cmd+=( "--force" )
          fi
          (
            cd "$CHATBOT_DIR"
            "${cmd[@]}"
          )

      - name: Collect latest run info
        id: latest
        shell: bash
        run: |
          set -euo pipefail
          latest_delta="$(ls -1t "$CHATBOT_OUTPUT_ROOT"/exports/delta_*.csv | head -n 1)"
          rows="$(python -c "import csv,sys; p=sys.argv[1]; print(sum(1 for _ in csv.DictReader(open(p, newline='', encoding='utf-8-sig', errors='replace'))))" "$latest_delta")"
          echo "delta_file=$latest_delta" >> "$GITHUB_OUTPUT"
          echo "delta_rows=$rows" >> "$GITHUB_OUTPUT"
          {
            echo "### WeStudy weekly result"
            echo "- delta: \`$latest_delta\`"
            echo "- rows: \`$rows\`"
            if [[ "$rows" -eq 0 ]]; then
              echo "- upload: skipped (差分0件)"
            else
              echo "- upload: executed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: westudy-limo-logs-${{ github.run_id }}
          path: |
            ${{ env.CHATBOT_OUTPUT_ROOT }}/exports/logs/
            ${{ env.CHATBOT_OUTPUT_ROOT }}/exports/delta_*.csv
          if-no-files-found: warn
          retention-days: 14

      - name: Commit state updates
        shell: bash
        run: |
          set -euo pipefail
          git add "$CHATBOT_DIR/state/westudy_comment_ids.json" "$CHATBOT_DIR/state/westudy_scrape/" 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update WeStudy state ($(date -u '+%Y-%m-%d'))"
          git push
