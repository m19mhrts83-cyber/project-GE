# パートナー社連絡先一覧（gmail / imessage / chatwork / line_to_yoritoori_clip / CHRLINE 系 PoC 用）
# メールアドレスは小文字で統一。複数ある場合はすべて記載。
# phones: iMessage/SMS 用。+819012345678 や 09012345678 など複数形式で登録可能。
# chatwork_room_id: Chatwork API 取得対象ルームID（数値文字列）
# chatwork_account_name: 取得対象の相手表示名（任意。空なら自分以外を取り込み）
# line: 人間向けメモ。主に「LINE トーク一覧に出る表示名」（グループ名・公式名）。line_mac_open_chat_poc.py の --title やアプリ内検索でそのまま使える表記で書く。複数トークがある場合は「 / 」などで並記。自動照合には使わない。
# line_group_chat_mid: グループトークの chatMid（非公式クライアント CHRLINE 等の送受信・一覧取得の宛先）。chrline_list_chats_poc.py の左列（タブ区切り）。未使用なら "" のまま。
#   取得例（line_unofficial_poc で QR ログイン済みのとき）:
#   cd ~/git-repos/line_unofficial_poc && source .venv/bin/activate && set -a && source .env && set +a && python chrline_list_chats_poc.py | grep キャラメル
# line_direct_chat_mid: 1対1トークの chatMid（同上）。担当者個人との LINE 用。未使用なら "" のまま。
# 実際の連絡先に置き換えてください。

