<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>コミュニケーション一元化（NotebookLM 図解）— DX互助会</title>
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
      background: #0d1117;
      color: #e6edf3;
    }
    .toolbar {
      position: fixed;
      z-index: 20;
      left: 0; right: 0; top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding: 0.5rem 1rem;
      background: rgba(13, 17, 23, 0.92);
      border-bottom: 1px solid #30363d;
      backdrop-filter: blur(8px);
    }
    .toolbar a { color: #58a6ff; text-decoration: none; }
    .toolbar a:hover { text-decoration: underline; }
    .toolbar .mid { font-size: 0.9rem; color: #8b949e; }
    .toolbar .btns { display: flex; gap: 0.5rem; align-items: center; }
    .toolbar button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .toolbar button:hover { background: #30363d; }
    .toolbar button:disabled { opacity: 0.45; cursor: not-allowed; }
    main {
      padding-top: 3.25rem;
      scroll-snap-type: y mandatory;
      overflow-y: auto;
      height: 100vh;
    }
    .slide {
      min-height: 100vh;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem 1rem 2rem;
      border-bottom: 1px solid #21262d;
    }
    .slide h2 {
      margin: 0 0 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      color: #8b949e;
      align-self: flex-start;
      max-width: min(100%, 1200px);
      width: 100%;
    }
    .slide img {
      max-width: min(100%, 1200px);
      width: auto;
      height: auto;
      max-height: calc(100vh - 6.5rem);
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }
    .pdf-wrap {
      width: min(100%, 1200px);
      flex: 1;
      min-height: min(75vh, 640px);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .pdf-wrap iframe {
      flex: 1;
      min-height: min(70vh, 600px);
      width: 100%;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #161b22;
    }
    .pdf-links {
      font-size: 0.88rem;
      line-height: 1.6;
      color: #8b949e;
    }
    .pdf-links a { color: #58a6ff; }
    .hint {
      position: fixed;
      z-index: 19;
      bottom: 0.75rem;
      right: 1rem;
      font-size: 0.75rem;
      color: #484f58;
      pointer-events: none;
    }
    @media (max-width: 600px) {
      .hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span><a href="2kai.html">← 第2回一覧</a></span>
    <span class="mid" id="indicator">1 / 3 · First</span>
    <div class="btns">
      <button type="button" id="btn-prev" aria-label="前へ">← 前へ</button>
      <button type="button" id="btn-next" aria-label="次へ">次へ →</button>
    </div>
  </div>
  <main id="deck" tabindex="-1">
    <section class="slide" id="s1" data-label="First" aria-label="スライド1 First">
      <h2>1 / 3 — First（全体像・導入）</h2>
      <img src="assets/nb_comm_unification/first.png" alt="コミュニケーション一元化の仕組み First（NotebookLM 出力）" width="1920" height="1080" loading="eager">
    </section>
    <section class="slide" id="s2" data-label="Main（PDF）" aria-label="スライド2 Main">
      <h2>2 / 3 — Main（PDF）</h2>
      <div class="pdf-wrap">
        <iframe
          title="Main 資料（PDF）"
          loading="lazy"
          src="assets/nb_comm_unification/main.pdf#view=FitH">
        </iframe>
        <div class="pdf-links">
          <a href="assets/nb_comm_unification/main.pdf" target="_blank" rel="noopener noreferrer">別タブで全画面表示</a>
          ／
          <a href="assets/nb_comm_unification/main.pdf" download>main.pdf をダウンロード</a>
        </div>
      </div>
    </section>
    <section class="slide" id="s3" data-label="Last" aria-label="スライド3 Last">
      <h2>3 / 3 — Last（まとめ）</h2>
      <img src="assets/nb_comm_unification/last.png" alt="コミュニケーション一元化の仕組み Last（NotebookLM 出力）" width="1920" height="1080" loading="lazy">
    </section>
  </main>
  <p class="hint">← → または ↑ ↓ でスライド移動 · 画面をスクロールしても切り替え可</p>
  <script>
(function () {
  const main = document.getElementById('deck');
  const slides = Array.from(document.querySelectorAll('.slide'));
  const indicator = document.getElementById('indicator');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');

  let idx = 0;

  function setIndex(i) {
    idx = Math.max(0, Math.min(slides.length - 1, i));
    slides[idx].scrollIntoView({ behavior: 'smooth', block: 'start' });
    updateIndicator();
  }

  function updateIndicator() {
    const s = slides[idx];
    const label = s ? s.dataset.label : '';
    indicator.textContent = (idx + 1) + ' / ' + slides.length + ' · ' + label;
    btnPrev.disabled = idx <= 0;
    btnNext.disabled = idx >= slides.length - 1;
  }

  function currentIndexFromScroll() {
    const y = main.scrollTop + main.clientHeight * 0.25;
    let best = 0;
    for (let i = 0; i < slides.length; i++) {
      const el = slides[i];
      if (el.offsetTop <= y) best = i;
    }
    return best;
  }

  let scrollTimer;
  main.addEventListener('scroll', function () {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(function () {
      const n = currentIndexFromScroll();
      if (n !== idx) {
        idx = n;
        updateIndicator();
      }
    }, 80);
  }, { passive: true });

  btnPrev.addEventListener('click', function () { setIndex(idx - 1); });
  btnNext.addEventListener('click', function () { setIndex(idx + 1); });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
      if (e.key === ' ') e.preventDefault();
      setIndex(idx + 1);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {
      setIndex(idx - 1);
    } else if (e.key === 'Home') {
      setIndex(0);
    } else if (e.key === 'End') {
      setIndex(slides.length - 1);
    }
  });

  updateIndicator();
})();
  </script>
</body>
</html>
